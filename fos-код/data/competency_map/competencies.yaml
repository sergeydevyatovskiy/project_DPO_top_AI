# =============================================================================
# Файл: data/competency_map/competencies.yaml
# Назначение: Компетенции и индикаторы КРМ, формируемые дисциплиной
# Дисциплина: Методы оптимизации в системах искусственного интеллекта
# Источник: КРМ ИТМО v3.0 (aimclub/ai-competency-model)
# ВАЖНО: Формулировки индикаторов приведены ДОСЛОВНО из КРМ
# =============================================================================

competencies:
  # ---------------------------------------------------------------------------
  # MF-3: Методы оптимизации
  # ---------------------------------------------------------------------------
  - code: MF-3
    block: "Математические основы ИИ"
    name: "Методы оптимизации"
    formulation: >
      Способен применять современные методы оптимизации для обучения моделей
      машинного обучения, настройки гиперпараметров и решения задач
      искусственного интеллекта.
    indicators:
      - code: MF-3.1
        name: "Применение методов оптимизации для разработки и исследования обучающих алгоритмов"
        formulation: >
          Применяет методы оптимизации для разработки и исследования
          обучающих алгоритмов.
        levels:
          basic: >
            Применяет типовые градиентные алгоритмы для решения типовых задач
            оптимизации и обучения, понимает основные теоретические аспекты
            градиентных алгоритмов, их классификацию и области применения.
          advanced: >
            Разрабатывает новые метаэвристические алгоритмы, обосновывая их
            новизну и значимость, или модифицирует существующие под реальные
            задачи.
        target_level_for_discipline: "basic"
        primary_role: "ML_RESEARCHER"

      - code: MF-3.2
        name: "Применение методов оптимизации для настройки гиперпараметров"
        formulation: >
          Применяет методы оптимизации для настройки гиперпараметров моделей
          машинного обучения, включая использование методов поиска (поиск по
          сетке, случайный поиск) и байесовской оптимизации.
        levels:
          basic: >
            Знает и использует стандартные методы поиска гиперпараметров, такие
            как поиск по решётке и случайный поиск, для настройки моделей
            машинного обучения в стандартных задачах.
          advanced: >
            Разрабатывает и применяет собственные методы оптимизации
            гиперпараметров для сложных задач с высокой размерностью,
            использует адаптивные подходы и интегрирует их с моделями
            машинного обучения для повышения точности и скорости работы.
        target_level_for_discipline: "basic"
        primary_role: "ML_RESEARCHER"

  # ---------------------------------------------------------------------------
  # ML-3: Методы классического машинного обучения с учителем
  # ---------------------------------------------------------------------------
  - code: ML-3
    block: "Машинное обучение"
    name: "Методы классического машинного обучения с учителем"
    formulation: >
      Способен применять классические алгоритмы машинного обучения с пониманием
      их математических основ и областей применения.
    indicators:
      - code: ML-3.1
        name: "Обоснование способов и вариантов применения классических методов МО"
        formulation: >
          Обосновывает способы и варианты применения классических методов и
          моделей МО в задачах ИИ, включая их математическое (алгоритмическое)
          преобразование и адаптацию к специфике задачи.
        levels:
          basic: >
            Описывает базовые модели МО с учителем (метод ближайших соседей,
            деревья принятия решений, линейная регрессия, логистическая
            регрессия, метод опорных векторов) с пониманием их математической
            сущности.
          advanced: >
            Разрабатывает и адаптирует собственные алгоритмические решения на
            основе классических методов. Обосновывает математически сложные
            решения.
        target_level_for_discipline: "basic"
        primary_role: "ML_RESEARCHER"

      - code: ML-3.2
        name: "Эффективное применение классических методов МО"
        formulation: >
          Эффективно применяет классические методы и модели МО для обеспечения
          достижимости функциональных характеристик систем ИИ.
        levels:
          basic: >
            Распознаёт и определяет практическую задачу в терминах обучения на
            частично размеченных данных. Применяет стандартные алгоритмы для
            работы с данными и обучения моделей с использованием неполной
            разметки.
          advanced: >
            Способен адаптировать и модифицировать существующие алгоритмы под
            специфику задачи. Интегрирует классические модели в сложные
            ИИ-системы с учётом требований к производительности и
            масштабированию.
        target_level_for_discipline: "basic"
        primary_role: "ML_RESEARCHER"

      - code: ML-3.3
        name: "Оценка результативности применения классических методов МО"
        formulation: >
          Оценивает результативность применения классических методов и моделей
          МО в задачах ИИ на основе сопоставления с аналогами.
        levels:
          basic: >
            Анализирует метрики и проводит сравнительный анализ нескольких
            моделей с учётом бизнес-требований.
          advanced: >
            Понимает теоретические ограничения алгоритмов и способен находить
            баланс между различными подходами. Проводит системный анализ
            эффективности моделей на уровне бизнес-эффекта, затрат и рисков.
        target_level_for_discipline: "basic"
        primary_role: "AI_SECURITY_ENGINEER"

  # ---------------------------------------------------------------------------
  # ML-5: Методы повышения устойчивости, надёжности, безопасности алгоритмов МО
  # ---------------------------------------------------------------------------
  - code: ML-5
    block: "Машинное обучение"
    name: "Методы повышения устойчивости, надёжности, безопасности алгоритмов МО"
    formulation: >
      Способен разрабатывать и (или) применять методы повышения устойчивости,
      надёжности, безопасности алгоритмов МО.
    indicators:
      - code: ML-5.1
        name: "Обоснование способов применения методов устойчивости и безопасности"
        formulation: >
          Обосновывает способы и варианты применения методов повышения
          устойчивости, надёжности, безопасности алгоритмов МО в задачах ИИ,
          включая их преобразование и адаптацию к специфике задачи.
        levels:
          basic: >
            Описывает базовые принципы повышения устойчивости и безопасности
            алгоритмов с применением основных методов оценки обобщаемости
            моделей МО и базовых подходов противодействия переобучению и
            дрейфу концепций.
          advanced: >
            Разрабатывает и аргументирует комплексные стратегии повышения
            устойчивости, надёжности и безопасности моделей МО с учётом
            современных методологий.
        target_level_for_discipline: "basic"
        primary_role: "AI_SECURITY_ENGINEER"

      - code: ML-5.2
        name: "Применение методов устойчивости для проверки гипотез и подготовки данных"
        formulation: >
          Применяет методы повышения устойчивости, надёжности, безопасности
          алгоритмов МО для проверки разведочных гипотез и подготовки данных
          к применению современных методов ИИ.
        levels:
          basic: >
            Применяет базовые методы предобработки данных и проверки гипотез с
            учётом устойчивости моделей, использует стандартные техники борьбы
            с переобучением.
          advanced: >
            Интегрирует комплексные методы защиты и повышения надёжности на
            этапах построения и проверки гипотез, применяет современные
            методологии анализа защищённости.
        target_level_for_discipline: "basic"
        primary_role: "AI_SECURITY_ENGINEER"

      - code: ML-5.3
        name: "Оценка результативности применения методов устойчивости и безопасности"
        formulation: >
          Оценивает результативность применения методов повышения устойчивости,
          надёжности, безопасности алгоритмов МО в задачах ИИ на основе
          сопоставления с аналогами.
        levels:
          basic: >
            Оценивает качество моделей МО с использованием стандартных метрик,
            сравнивает результаты с базовыми аналогами, учитывая переобучение и
            стабильность моделей.
          advanced: >
            Выполняет глубокий сравнительный анализ эффективности и безопасности
            моделей с применением современных методологий (MITRE ATLAS),
            формирует рекомендации по улучшению устойчивости и надёжности.
        target_level_for_discipline: "basic"
        primary_role: "AI_SECURITY_ENGINEER"