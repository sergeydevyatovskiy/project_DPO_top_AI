# =============================================================================
# Файл: data/competency_map/roles.yaml
# Назначение: Выбранные профессиональные роли КРМ ИТМО для дисциплины
# Дисциплина: Методы оптимизации в системах искусственного интеллекта
# Источник: КРМ ИТМО v3.0 (aimclub/ai-competency-model)
# =============================================================================

roles:
  - code: ML_RESEARCHER
    name_ru: "Исследователь машинного обучения"
    name_en: "ML Researcher"
    description: >
      Учёный-исследователь, разрабатывающий новые алгоритмы машинного обучения
      и проводящий фундаментальные исследования в области ИИ. В контексте
      дисциплины — специалист, исследующий, сравнивающий и совершенствующий
      методы оптимизации обучения моделей ИИ.
    key_functions:
      - "Разработка новых алгоритмов и методов МО"
      - "Проведение научных исследований и экспериментов"
      - "Создание прототипов инновационных решений"
      - "Анализ современных трендов в ИИ"
    focus_competencies:
      - MF-3   # Методы оптимизации
      - ML-3   # Методы классического МО с учителем

  - code: AI_SECURITY_ENGINEER
    name_ru: "Инженер безопасности ИИ"
    name_en: "AI Security Engineer"
    description: >
      Специалист по обеспечению безопасности, надёжности и этичности систем
      искусственного интеллекта. В контексте дисциплины — специалист,
      обеспечивающий устойчивость и робастность процессов оптимизации
      и обучения моделей ИИ.
    key_functions:
      - "Анализ уязвимостей и угроз в ИИ-системах"
      - "Разработка методов защиты от атак на ИИ"
      - "Валидация и тестирование ИИ-систем на безопасность"
      - "Управление рисками в ИИ-проектах"
    focus_competencies:
      - ML-5   # Методы повышения устойчивости, надёжности, безопасности алгоритмов МО
      - ML-3   # Методы классического МО с учителем (в части оценки результативности)